<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>坦克大战</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>🎮 坦克大战</h1>
          <p id="roomStatus">未加入房间</p>
        </div>
        <div class="room-chip">
          <span>房间</span>
          <strong id="roomIdLabel">------</strong>
          <button id="shareButton" type="button">分享</button>
        </div>
      </header>

      <section class="lobby" id="lobby">
        <label class="field">
          <span>昵称</span>
          <input id="playerName" maxlength="18" value="玩家" autocomplete="nickname">
        </label>
        <button id="createRoom" class="primary" type="button">创建房间</button>
        <label class="field room-entry">
          <span>加入房间</span>
          <input id="joinRoomId" inputmode="numeric" maxlength="6" aria-label="六位房间号">
        </label>
        <button id="joinRoom" type="button">加入房间</button>
        <button id="randomMap" type="button">随机地图</button>
        <button id="leaveRoom" type="button">返回大厅</button>
      </section>

      <section class="content-grid">
        <div class="game-stage">
          <canvas id="gameCanvas" width="624" height="624" aria-label="坦克大战游戏画面"></canvas>
          <div class="hud-row">
            <div id="hpPanel">血量: ---</div>
            <div id="mapPanel">地图: 随机</div>
            <div id="controlHint">P1: WASD+空格 | P2: 方向键+回车</div>
          </div>
          <div class="overlay" id="overlay">
            <h2 id="overlayTitle">创建或加入房间</h2>
            <p id="overlayText">需要两名玩家，满人自动开始对战。</p>
            <div class="overlay-actions">
              <button id="playAgain" type="button">再来一局</button>
              <button id="backToLobby" type="button">返回大厅</button>
            </div>
          </div>
        </div>

        <aside class="side-panel">
          <section>
            <div class="panel-title">
              <h2>🏆 排行榜</h2>
              <button id="refreshLeaderboard" type="button">刷新</button>
            </div>
            <ol id="leaderboard" class="leaderboard"></ol>
          </section>

          <section>
            <div class="panel-title">
              <h2>📊 本局统计</h2>
              <button id="resetStats" type="button">重置</button>
            </div>
            <div id="currentStats" class="stats-grid">
              <span>局数</span><strong>0</strong>
              <span>胜场</span><strong>0</strong>
              <span>击杀</span><strong>0</strong>
              <span>伤害</span><strong>0</strong>
            </div>
          </section>

          <section>
            <h2>👥 玩家</h2>
            <div id="playersList" class="players-list"></div>
          </section>
        </aside>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/games/main.js"></script>
  </body>
</html>
